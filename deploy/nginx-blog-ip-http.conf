# 仅用于公网 IP 的 HTTP(80) 访问；域名仍由 Certbot 的 server 处理 HTTPS。
# 安装：sudo cp deploy/nginx-blog-ip-http.conf /etc/nginx/sites-available/blog-ip-http.conf
# sudo ln -sf /etc/nginx/sites-available/blog-ip-http.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# 将 server_name 中的 IP 换成你的公网 IP。

server {
    listen 80;
    server_name 150.158.75.100;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
