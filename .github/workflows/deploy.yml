# 推送到 main 后 SSH 到服务器执行：git pull → npm install → build → pm2 restart
#
# Secrets：DEPLOY_HOST、DEPLOY_USER、DEPLOY_SSH_KEY（见 deploy/TROUBLESHOOTING-ACTIONS.md）
# 可选 Variable：DEPLOY_DEBUG=true 时打开 SSH 调试日志
# 非默认 SSH 端口：在 host 写 host:port，例如 1.2.3.4:2222（见 appleboy/ssh-action 文档）

name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          missing=()
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && missing+=("DEPLOY_HOST")
          [ -z "${{ secrets.DEPLOY_USER }}" ] && missing+=("DEPLOY_USER")
          [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ] && missing+=("DEPLOY_SSH_KEY")
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::缺少 Repository secrets: ${missing[*]}"
            echo "请到 Settings → Secrets and variables → Actions → Repository secrets 添加，名称必须完全一致（区分大小写）。"
            exit 1
          fi

      - name: SSH smoke test (whoami)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120s
          debug: ${{ vars.DEPLOY_DEBUG == 'true' }}
          script: whoami

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120s
          debug: ${{ vars.DEPLOY_DEBUG == 'true' }}
          script_stop: true
          command_timeout: 20m
          script: |
            bash -lc "set -euo pipefail; cd /var/www/blog && git pull origin main && npm install && npm run build && pm2 restart blog --update-env && echo Deploy OK"
