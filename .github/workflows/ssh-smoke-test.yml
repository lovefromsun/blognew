# 仅验证：GitHub Actions 能否 SSH 登录服务器（不执行部署）
# 用法：Actions → 选本 workflow → Run workflow

name: SSH smoke test

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          missing=()
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && missing+=("DEPLOY_HOST")
          [ -z "${{ secrets.DEPLOY_USER }}" ] && missing+=("DEPLOY_USER")
          [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ] && missing+=("DEPLOY_SSH_KEY")
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::缺少 Repository secrets: ${missing[*]}"
            echo "请到 Settings → Secrets and variables → Actions → Repository secrets 添加（DEPLOY_HOST、DEPLOY_USER、DEPLOY_SSH_KEY）。"
            exit 1
          fi

      - name: SSH whoami
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120s
          debug: ${{ vars.DEPLOY_DEBUG == 'true' }}
          script: |
            set -e
            whoami
            hostname
            echo "SSH OK"
